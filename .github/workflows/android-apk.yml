name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - "app/**"
      - "assets/**"
      - "components/**"
      - "constants/**"
      - "hooks/**"
      - "lib/**"
      - "server/**"
      - "shared/**"
      - "drizzle/**"
      - "app.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "babel.config.js"
      - "metro.config.js"
      - "tsconfig.json"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Android project
        run: pnpm exec expo prebuild --platform android --no-install --clean

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk simcard-reminder-android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simcard-reminder-android-apk
          path: simcard-reminder-android.apk
          if-no-files-found: error
          retention-days: 30
