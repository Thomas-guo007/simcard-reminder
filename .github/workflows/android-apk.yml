name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - "app/**"
      - "assets/**"
      - "components/**"
      - "constants/**"
      - "hooks/**"
      - "lib/**"
      - "server/**"
      - "shared/**"
      - "drizzle/**"
      - "app.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "babel.config.js"
      - "metro.config.js"
      - "tsconfig.json"
      - "version.json"

permissions:
  contents: write

jobs:
  build:
    name: Build optimized release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Generate Android project
        run: pnpm exec expo prebuild --platform android --no-install --clean

      - name: Enable release optimization
        run: |
          cat >> android/gradle.properties <<'EOF'
          EX_DEV_CLIENT_NETWORK_INSPECTOR=false
          expo.useLegacyPackaging=true
          android.enableMinifyInReleaseBuilds=true
          android.enableShrinkResourcesInReleaseBuilds=true
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Publish APK into dist
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/simcard-reminder-android-release-v1.2.5.apk
          rm -f dist/simcard-reminder-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: simcard-reminder-android-release-v1.2.5
          path: dist/simcard-reminder-android-release-v1.2.5.apk
          if-no-files-found: error
          retention-days: 30

      - name: Commit APK to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/simcard-reminder-android-release-v1.2.5.apk
          git rm -f --ignore-unmatch dist/simcard-reminder-android-debug.apk
          if ! git diff --cached --quiet; then
            git commit -m "Add optimized Android release APK [skip ci]"
            git push
          fi
